<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Expense Tracker Lite</h1>

<div class="grid">

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/710heH2Z3wL._SX425_.jpg">
        <div class="overlay">
            <span class="item-name">Crystal Ball Night Light</span>
            <p class="item-price" data-price="1000">₹1000</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61LtuGzXeaL._SX522_.jpg">
        <div class="overlay">
            <span class="item-name">Bluetooth Speaker</span>
            <p class="item-price" data-price="1500">₹1500</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/318URyFXyFL._SY300_SX300_QL70_FMwebp_.jpg">
        <div class="overlay">
            <span class="item-name">Wireless Headphones</span>
            <p class="item-price" data-price="2200">₹2200</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71GtgMbKvKL._SY450_.jpg">
        <div class="overlay">
            <span class="item-name">Smart Watch</span>
            <p class="item-price" data-price="3000">₹3000</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/41KOJboKMuL._SX342_SY445_QL70_FMwebp_.jpg">
        <div class="overlay">
            <span class="item-name">LED Desk Lamp</span>
            <p class="item-price" data-price="800">₹800</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61mpMH5TzkL._SX679_.jpg">
        <div class="overlay">
            <span class="item-name">Gaming Mouse</span>
            <p class="item-price" data-price="1200">₹1200</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71Bd7w71lcL._SY450_.jpg">
        <div class="overlay">
            <span class="item-name">Mechanical Keyboard</span>
            <p class="item-price" data-price="2500">₹2500</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71QPD30PafL._SX425_.jpg">
        <div class="overlay">
            <span class="item-name">Power Bank</span>
            <p class="item-price" data-price="1800">₹1800</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61Es4AZohLL._SY450_.jpg">
        <div class="overlay">
            <span class="item-name">USB Hub</span>
            <p class="item-price" data-price="900">₹900</p>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61HQKFfiFPL._SY355_.jpg">
        <div class="overlay">
            <span class="item-name">Mini Tripod</span>
            <p class="item-price" data-price="700">₹700</p>
        </div>
    </div>

</div>

<div class="item-list">
    <span class="list-title">Your Items</span>
    <ul class="list-container"></ul>

    <div class="bill-box">
        <p id="Total-bill">₹0</p>
        <button id="Total-amount">Give Me my Shopping bill</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
